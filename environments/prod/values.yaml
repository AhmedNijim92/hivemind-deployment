global:
  domain: api.hivemind.com
  imageRegistry: docker.io/ahmednijim92
  imageTag: latest
  storageClass: fast-ssd
  pullPolicy: IfNotPresent

# ─── Infrastructure ──────────────────────────────────────────────────────
cassandra:
  replicaCount: 3
  password: CHANGE_ME_PRODUCTION

kafka:
  replicaCount: 3

redis:
  password: CHANGE_ME_PRODUCTION

mongodb:
  replicaCount: 3
  password: CHANGE_ME_PRODUCTION

postgresql:
  replicaCount: 2

# ─── Services ────────────────────────────────────────────────────────────
services:
  auth:
    replicaCount: 3
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 1
  
  user:
    replicaCount: 3
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 1
  
  group:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
  
  post:
    replicaCount: 3
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
  
  meeting:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
  
  notification:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
    pdb:
      enabled: true
      minAvailable: 1
  
  media:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
  
  gateway:
    replicaCount: 3
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60
    pdb:
      enabled: true
      minAvailable: 1

# ─── Ingress ─────────────────────────────────────────────────────────────
ingress:
  tls: true
  domain: hivemind.com
  corsOrigin: "https://hivemind.com"
