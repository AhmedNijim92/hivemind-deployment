apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: {{ .Release.Namespace }}
  labels:
    app: cassandra
spec:
  serviceName: cassandra-headless
  replicas: {{ .Values.size }}
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: "cassandra:{{ .Values.cassandraVersion }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9042
              name: cql
            - containerPort: 7000
              name: intra-node
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "hivemind-cluster"
            - name: CASSANDRA_DC
              value: "{{ .Values.datacenterName }}"
            - name: CASSANDRA_RACK
              value: "rack1"
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: "SimpleSnitch"
            - name: HEAP_NEWSIZE
              value: "128M"
            - name: MAX_HEAP_SIZE
              value: "{{ .Values.heapSize }}"
            - name: CASSANDRA_NUM_TOKENS
              value: "16"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - "cqlsh -e 'describe cluster' localhost 9042"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - "nodetool status | grep -q '^UN'"
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: {{ .Release.Namespace }}
  labels:
    app: cassandra
spec:
  type: ClusterIP
  selector:
    app: cassandra
  ports:
    - port: 9042
      targetPort: 9042
      name: cql
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: cassandra
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: cassandra
  ports:
    - port: 9042
      targetPort: 9042
      name: cql
    - port: 7000
      targetPort: 7000
      name: intra-node
