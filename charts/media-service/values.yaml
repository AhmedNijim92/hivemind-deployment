replicaCount: 2
revisionHistoryLimit: 5
terminationGracePeriodSeconds: 30

image:
  repository: hivemind/media-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8087

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

env:
  SPRING_PROFILES_ACTIVE: "prod"
  EUREKA_SERVER: "http://eureka-server:8761/eureka"
  DB_HOST: "postgresql"
  DB_PORT: "5432"
  DB_USERNAME: "postgres"

secrets:
  DB_PASSWORD: ""
  AWS_ACCESS_KEY: ""
  AWS_SECRET_KEY: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountToken: false

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

ingress:
  enabled: false

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: media-service
