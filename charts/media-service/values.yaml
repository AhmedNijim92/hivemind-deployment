replicaCount: 2

image:
  repository: hivemind/media-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8087

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

env:
  SPRING_PROFILES_ACTIVE: "prod"
  EUREKA_SERVER: "http://eureka-server:8761/eureka"
  DB_USERNAME: "postgres"
  AWS_REGION: "us-east-1"
  S3_BUCKET: "hivemind-media"

secrets:
  DB_PASSWORD: ""
  AWS_ACCESS_KEY: ""
  AWS_SECRET_KEY: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
