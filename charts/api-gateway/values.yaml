replicaCount: 2

image:
  repository: hivemind/api-gateway
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8080

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

env:
  SPRING_PROFILES_ACTIVE: "prod"
  EUREKA_SERVER: "http://eureka-server:8761/eureka"

secrets:
  JWT_SECRET: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
