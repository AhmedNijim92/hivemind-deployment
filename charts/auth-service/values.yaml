replicaCount: 2

image:
  repository: hivemind/auth-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

env:
  SPRING_PROFILES_ACTIVE: "prod"
  EUREKA_SERVER: "http://eureka-server:8761/eureka"
  CASSANDRA_HOST: "cassandra"
  CASSANDRA_PORT: "9042"
  CASSANDRA_DATACENTER: "datacenter1"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

secrets:
  JWT_SECRET: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_PHONE_NUMBER: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
